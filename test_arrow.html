<svg width="300" height="200">
  <defs>
    <filter id="intersectionFilter" x="0" y="0" width="100%" height="100%">
      <!-- Bring rect A into the filter -->
      <feImage href="#rectA" result="A"/>
      <!-- Bring rect B into the filter -->
      <feImage href="#rectB" result="B"/>

      <!-- Compute intersection -->
      <feBlend in="A" in2="B" mode="multiply" result="intersection"/>

      <!-- Tint it -->
      <feFlood flood-color="rgba(0,0,0,0.8)" result="shade"/>
      <feComposite in="shade" in2="intersection" operator="in"/>
    </filter>
  </defs>

  <!-- Visible rects -->
  <rect id="rectA" x="40" y="40" width="150" height="100" fill="cyan"/>
  <rect id="rectB" x="120" y="20" width="150" height="120" fill="lightgreen"/>

  <!-- Apply filter -->
  <g filter="url(#intersectionFilter)"></g>
</svg>
