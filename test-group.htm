<style>

* {
    font-family: Arial, Helvetica, sans-serif;

    }

svg {
    touch-action: none; /* disable default touch actions e.g. scrolling when touching svg */
    background-color: lightgray;
    }

/* these 7 lines finally work but not sure why I have to be so delicate  ...*/
.cloaked * { visibility: hidden; }
/* I think it's because there are nested g groups, so have to be specific */
g.node.whole * { filter: grayscale(100%); opacity: 0.5; }
g.node.whole.selected * { visibility: visible; filter: none; opacity: 1; }

g.region.whole * { filter: grayscale(100%); opacity: 0.5; }
g.region.whole.selected * { visibility: visible; filter: none; opacity: 1; }

g.edge.whole * { filter: grayscale(100%); opacity: 0.5; }
g.edge.whole.selected * { visibility: visible; filter: none; opacity: 1; }


.region.rect { 
    fill:aquamarine;
    fill-opacity: 0.4;
    stroke:black; /* the "contour" */
    rx: 16;
    ry: 16;
}

.locked * { 
    stroke:red;
    rx: 0;
    ry: 0;
}

foreignObject {
    background-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none; /* let mouse events pass through  */
}

.fob.banner {
    padding: 5;
}

.fob.body {
    font-size: smaller;
    padding: 5;
}

.fob.stub {
    display: flex;
    text-align: center;
    vertical-align: center;  /* has no visible effect */
    transform-origin: top left;
    transform: translate(0, 300px) rotate(270deg);
}

.div.stub {
    padding: 6;
}

.scrollable {
  max-height: 100%;
  overflow-y: auto;    /* enable vertical scrolling */
  overflow-x: hidden; 
  scroll-behavior: smooth;
  scrollbar-width: none;
  pointer-events: all;

}

.node.whole * {
    stroke: black;
}






.shift-down g.region.whole {
    cursor: zoom-out;
}

.shift-down g.node.whole {
    cursor: zoom-in;
}

g.empty * {
    stroke: none;
    cursor: auto;

}


/* g:hover fires for the whole bounding box, and eveything in the group, even if not visible */

g.edge.whole:hover * {
    stroke:black;
    stroke-dasharray: 2,2;
}

g.edge.whole * {
    pointer-events: stroke; /* avoids fill, but does include invisible zone stroke */
}

polyline.edge.line {
    fill: none;
    stroke: red;

}

polyline.edge.zone {
    fill: none;
    stroke-width: 10;
    stroke: transparent; 
    stroke-dasharray: none;

}

g.edge.whole.ctrl-down * {
    cursor:grab;
}


</style>
