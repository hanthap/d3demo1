<style>

* {
    font-family: Arial, Helvetica, sans-serif;

    }

svg {
    touch-action: none; /* disable default touch actions e.g. scrolling when touching svg */
    background-color: lightgray;
    }

svg.zoomable {
  width: 100%;
  height: 100%;
  overflow: hidden;      /* hide content when panned */
  touch-action: none;    /* allow custom pinch/drag handling */
  cursor: grab;          /* visual hint for panning */
}

svg.zoomable:active {
  cursor: grabbing;
}

/* Optional: the inner group that you transform for zoom/pan */
svg.zoomable g.viewport {
  transform-origin: 0 0; /* makes math simpler when using viewBox-like transforms */
  ;
}

/* selected shapes are always foreground; others are grey (or invisible if 'all' container is cloaked) */

.cloaked g { visibility: hidden; } /* this is the only variant I've found that works as expected with node images */
g.whole * { filter: grayscale(100%); opacity: 0.5; }
g.whole.selected * { visibility: visible; filter: none; opacity: 1; }

.region.rect { 
    fill:aquamarine;
    fill-opacity: 0.4;
    stroke:black; /* the "contour" */
    rx: 16;
    ry: 16;
}

.region.locked * { 
    stroke:red;
    rx: 0; /* square corners, for rect */
    ry: 0;
}

foreignObject {
    background-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none; /* let mouse events pass through  */
}

.fob.banner {
    padding: 5;
}

.fob.body {
    font-size: smaller;
    padding: 5;
}

.fob.stub {
    display: flex;
    text-align: center;
    transform-origin: top left;
    /* transform: translate(0, 300px) rotate(270deg); */
}

.fob.tag * {
    color: orange;
}

.div.stub {
    padding: 6;
    color: blue;
}

/* enable mouse wheel vertical scrolling of rendered html within card's body area */
.scrollable {
  max-height: 100%;
  overflow-y: auto;    
  overflow-x: hidden; 
  scroll-behavior: smooth;
  scrollbar-width: none;
  pointer-events: all;

}

.node.whole * {
    stroke: black;
}

.shift-down g.region.whole {
    cursor: zoom-out;
}

.shift-down g.node.whole {
    cursor: zoom-in;
}

g.empty * { /* leaf node, nothing to see inside */
    stroke: none;
    cursor: auto; /* no zoom in */

}


/* g:hover fires for the whole bounding box, and eveything in the group, even if not visible */

g.whole:hover * {
    stroke:black;
    stroke-dasharray: 2,2;
}

/* :active = the drag START object, which then stays active until mouse up event */
g.whole:active * {
    stroke:red;
    cursor:move;
    stroke-width: 2;
    stroke-dasharray: 3,1;
}


g.edge.whole * {
    pointer-events: stroke; /* ignore events in fill area, but does include invisible zone stroke */
}

polyline.edge.line {
    fill: none;

}

polyline.edge.zone {
    fill: none;
    stroke-width: 10;
    stroke: transparent;
    stroke-dasharray: none;

}

g.edge.whole.ctrl-down * {
    cursor:grab;
}


:root {
  --clip-scale: 0.5; /* 0 = nothing, 1 = full height */
}


rect.contour {
    rx: 8;
    ry: 8;
    stroke-width: 1;

}

const input = document.getElementById("fileInput");

const svg = document.querySelector("svg.zoomable");
const vp  = svg.querySelector("g.viewport");

let scale = 1;
let panX = 0;
let panY = 0;

let isPanning = false;
let startX = 0;
let startY = 0;

// --- Wheel zoom ---
svg.addEventListener("wheel", e => {
  e.preventDefault();

  const zoomFactor = 1.1;
  const direction = e.deltaY < 0 ? 1 : -1;
  const newScale = scale * (direction > 0 ? zoomFactor : 1 / zoomFactor);

  // Zoom around mouse position
  const pt = svg.createSVGPoint();
  pt.x = e.clientX;
  pt.y = e.clientY;
  const cursor = pt.matrixTransform(vp.getScreenCTM().inverse());

  panX = cursor.x - (cursor.x - panX) * (newScale / scale);
  panY = cursor.y - (cursor.y - panY) * (newScale / scale);

  scale = newScale;
  update();
}, { passive: false });

// --- Drag pan ---
svg.addEventListener("mousedown", e => {
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
});

window.addEventListener("mousemove", e => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  update();
});

window.addEventListener("mouseup", () => {
  isPanning = false;
});

// --- Apply transform ---
function update() {
  vp.setAttribute("transform", `translate(${panX},${panY}) scale(${scale})`);
}

 }
