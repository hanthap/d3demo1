<style>

* {
    font-family: Arial, Helvetica, sans-serif;
    }

svg {
    touch-action: none; /* disable default touch actions e.g. scrolling when touching svg */
    background-color: lightgray;
    }

.region-whole * { 
    filter:grayscale(100%);
    opacity:0.5;
}

.region-rect { 
    fill:aquamarine;
    fill-opacity: 0.4;
    stroke:black; /* the "contour" */
    rx: 16;
    ry: 16;
}

.locked * { 
    stroke:red;
    rx: 0;
    ry: 0;
}

foreignObject {
    background-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}

.fob-banner {
    padding: 5;
}

.fob-body {
    font-size: smaller;
    padding: 5;
}

.fob-stub {
    display: flex;
    text-align: center;
    vertical-align: center;  /* has no visible effect */
    transform-origin: top left;
    transform: translate(0, 300px) rotate(270deg);
}

.div-stub {
    padding: 6;
}

.scrollable {
  max-height: 100%;
  overflow-y: auto;    /* enable vertical scrolling */
  overflow-x: hidden; 
  scroll-behavior: smooth;
  scrollbar-width: none;

}

/* 
.scrollable::-webkit-scrollbar {
  width: 8px;
}

.scrollable::-webkit-scrollbar-thumb {
  background: #666;
  border-radius: 4px;
}

.scrollable::-webkit-scrollbar-track {
  background: #ddd;
} */


.node-whole * {
    stroke:black;
    filter:grayscale(100%);
    opacity:0.5;
}



.selected * { 
    filter: none; /* full colour */
    opacity: 1;
    stroke-width: 1.5;
}



.shift-down g.region-whole {
    cursor: zoom-out;
}

.shift-down g.node-whole {
    cursor: zoom-in;
}

g.empty * {
    stroke: none;
    cursor:auto;

}

g:hover * {
    stroke:black;
    stroke-dasharray: 2,2;
}

</style>
