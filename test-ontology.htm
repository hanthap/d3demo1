
<input type="file" title="Choose ontology file(s)" id="fileInput" accept="application/json" multiple>


<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<script>
var graph, ont, selPara;




//----------------------------------------------------------

function hashString(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = (h * 33) ^ str.charCodeAt(i);
  }
  return (h >>> 0)        // force unsigned 32‑bit
        .toString(16)     // covert to hex
        .padStart(8, '0'); // leading zeroes to 8 spaces
}
//----------------------------------------------------------

async function read_json_file(file_obj) {
  const text = await file_obj.text();
  const json_data = JSON.parse(text);
  return json_data;
}

//----------------------------------------------------------
async function OnChange() {

    const file_obj = input.files[0];
    const json_data = await read_json_file(file_obj);
    var ont = load_ontology(json_data,file_obj);
    ont = bind_ontology(ont);
    const graph = create_graph(ont);
    start(graph);
  
}
//----------------------------------------------------------

const input = document.getElementById("fileInput");
input.addEventListener("change", OnChange);

//----------------------------------------------------------

function start(graph) {

  const body = d3.select('body');

  selPara = body.selectAll('p')
    .data(Object.values(graph.nodes),d=>d.uniqueId())
    .join('p')
    .attr('id',d=>d.uniqueId())
    .text(d=>d.toString())
    ;

  console.log(selPara);

}
//----------------------------------------------------------

class NodeDatum { 
 constructor(obj) {
    this.base = obj; // Entity
    this.x = Math.random(); // same Entity can appear across many views each with its own NodeDatum (x,y,fx,fy,width etc.)
 }
uniqueId() { return this.base.uniqueId() }
toString() { return this.base.toString() }

 }

//----------------------------------------------------------


class RelationType {
  constructor(str,source_fid) { 
    this.id = str;
    this.uid = hashString(this.id) + source_fid;
  
  }

  keyId() { return this.id }
  uniqueId() { return this.uid } 
  toString() { return this.id }

}

//----------------------------------------------------------

class EntityType {
  constructor(str,source_fid) { 
    this.id = str; 
    this.uid = hashString(this.id) + source_fid;
  }
  keyId() { return this.id } // for binding
  uniqueId() { return this.uid } 
  toString() { return this.id }

}
//----------------------------------------------------------

class Entity {
  constructor(obj,source_fid,key=null) { 
    Object.assign(this, obj); 
    this.id = key ?? obj.name ?? RandomId('E');
    this.uid = hashString(this.id) + source_fid;
  }
  typeId() { return this.type ?? 'Entity'; }
  keyId() { return this.id } // for local binding within this ontology
  uniqueId() { return this.uid } // for graph binding across ontologies
  bind(types) { this.objType = types[this.typeId()]; }
  toString() { return `${this.objType.toString()}: ${this.id}: [${this.labels  ?? this.description ?? Object.entries(this.properties)}]`    }

}

//----------------------------------------------------------

class Relation  {
  constructor(obj,source_fid) {
    Object.assign(this, obj);
    this.id = obj.key ?? RandomId('R');
    this.uid = hashString(this.id) + source_fid;
  }
  keyId() { return this.id }
  uniqueId() { return this.uid } 
  typeId() { return this.predicate ?? this.cardinality ?? 'Relation'; }
  fromId() { return this.subject ?? this.sourceEntity; }
  toId() { return this.object ?? this.targetEntity; }
  bind(entities,relations) { 
    this.baseFrom = entities[this.fromId()];
    this.baseTo = entities[this.toId()];
    this.baseType = relations[this.typeId()];
  }

}

//----------------------------------------------------------

// same Relation can appear across many views each with its own LinkDatum (x,y,fx,fy,width etc.)

class LinkDatum {  
 constructor(obj) {
    this.base = obj; // Relation
    this.y = Math.random(); 
 }
  bind(nodes) { 
    this.datumFrom = nodes[this.base.baseFrom.uniqueId()];
    this.datumTo = nodes[this.base.baseTo.uniqueId()];
  }
}
//----------------------------------------------------------


function RandomId(prefix) {
    return prefix + (1000000 + Math.round(1000800*Math.random()));
}

//----------------------------------------------------------
// align & conform raw JSON structure ready for binding 
function load_ontology(src,file_obj) {

entities = undefined; 
relations = undefined; 
classes = undefined; 
predicates = undefined;
source_fid = hashString(file_obj.name);

// LLMs don't always spit out the same JSON structure & naming convention... Here we cater for just some of the variants
    if (src.entities) entities = src.entities;
    if (src.relations) relations = src.relations;
    if (src.classes) classes = src.classes;
    if (src.ontology) {
        if (src.ontology.classes) classes = src.ontology.classes;
        if (src.ontology.entities) entities = src.ontology.entities;
        if (src.ontology.relationships) relations = src.ontology.relationships;
        if (src.ontology.relations) predicates = src.ontology.relations;
    }

return {file_obj, source_fid, entities, relations, classes, predicates} ;

  }

//----------------------------------------------------------
// given a clean ontology structure, add local object bindings based on lookup keys

function bind_ontology(ont) {

// Raw JSON may include dict of objects.  We want to cast those objects into custom classes
// It helps to convert them to array of [key,obj] entries


  //----------------------------------------------------------

if (Array.isArray(ont.entities)) // assumes it's an array of objects (not key-value pairs)
  ont.entities = ont.entities.map(obj => new Entity(obj,source_fid)); 
else { // assume dict of Objects
  ont.entities = Object.entries(ont.entities); // convert dict to array of [key,obj] pairs
  ont.entities = ont.entities.map(([key,obj]) => new Entity(obj,source_fid,key)); // simple array of Entities
}
ont.entities = ont.entities.map(obj => [obj.keyId(),obj]); // use class method to get key
ont.entities = Object.fromEntries(ont.entities); 

//----------------------------------------------------------
ont.relations = ont.relations.map(obj => new Relation(obj,source_fid));
ont.relations = ont.relations.map(obj => [obj.keyId(),obj]);  // use class method to get key
ont.relations = Object.fromEntries(ont.relations);
//----------------------------------------------------------
if (!Array.isArray(ont.classes)) ont.classes = Object.values(ont.entities).map(obj => obj.typeId()); 
ont.classes = [...new Set(ont.classes)]; // de-dupe the array
ont.classes = ont.classes.map(str => [str,new EntityType(str,source_fid)]);  
ont.classes = Object.fromEntries(ont.classes);
//----------------------------------------------------------

if (!Array.isArray(ont.predicates)) ont.predicates =  Object.values(ont.relations).map(obj => obj.typeId()); 
ont.predicates = [...new Set(ont.predicates)]; // de-dupe the array
ont.predicates = ont.predicates.map(str => [str, new RelationType(str,source_fid)]);  
ont.predicates = Object.fromEntries(ont.predicates);

//----------------------------------------------------------
Object.values(ont.entities).forEach(obj => obj.bind(ont.classes));
Object.values(ont.relations).forEach(obj => obj.bind(ont.entities,ont.predicates));

console.log(ont);

return ont;
}

//----------------------------------------------------------
// given a bound ontology, generate a fresh set of datum objects that D3 can manipulate wihtout impacting others
// TODO: support multiple graphs/views, each referencing multiple ontologies while avoiding name collisions
function create_graph(bound_ont) {

nodes = Object.values(bound_ont.entities).map(obj => [obj.uniqueId(),new NodeDatum(obj)]); 
nodes = Object.fromEntries(nodes); // convert to dict object

links = Object.values(bound_ont.relations).map(obj => new LinkDatum(obj));
links.forEach(obj => obj.bind(nodes));

console.log("nodes,links",nodes,links);

return { nodes, links };

}

//----------------------------------------------------------









</script>
