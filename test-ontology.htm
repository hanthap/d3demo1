function hashString(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = (h * 33) ^ str.charCodeAt(i);
  }
  return (h >>> 0)        // force unsigned 32‑bit
        .toString(16)     // convert to hex
        .padStart(8,'0'); // leading zeroes to 8 spaces
}

// WeakMap is a good way to store child->parent reverse lookups - helps prevent memory leaks 
// think of it as disabling foreign key constraints
// eg from (child) Entity to (parent) Ontology 
// If every Entity was strongly bound to its Ontology then garbage collection would never happen
// With WeakMap, If the key (child) becomes "unreachable" then the mapping disappears automatically
// maybe even Datum->Entity? 

//============================================================

class WeakBind {
  static parentOf = new WeakMap();
  static attach(parent, key, child) {
    parent[key] = child;
    WeakBind.parentOf.set(child, parent);
  }
}

}

  downloadFdg(to_filename=null) {

    to_filename = to_filename ?? this.name + '.fdg';

    const exclude_regex = new RegExp('^_', "i"); 

    const json = JSON.stringify(this, (key, value) => { 
        if (exclude_regex.test(key)) return undefined; // skip keys that start with underscore
        else {
          if (value instanceof Set) return [...value]; // convert
          if (typeof value === 'number') return Math.round(value*10000)/10000;
          else return value; 
          } 
        }, 2 );

    const fdg_script = `Workspace.loadGraph('${this.uniqueId()}','${to_filename}','${Date()}',` + json + ');' ;

    const blob = new Blob([fdg_script], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = to_filename;
    a.click();

    URL.revokeObjectURL(url);
  }

  mergeOntology(bound_ont) { 

    //console.log("mergeOntology(bound_ont)",bound_ont);  

    this.sources[bound_ont.source.uniqueId()] = bound_ont.source;

    // concatenate classes and predicates into a generic 'types' lookup table
    const new_nodeTypes = Object.values(bound_ont.classes).map(obj => new TypeSpecRW(this,obj)); 
     new_nodeTypes.forEach(d => this.types[d.uniqueId()] = d);

    const new_types = Object.values(bound_ont.predicates).map(obj => new TypeSpecRW(this,obj)); 
    new_types.forEach(d => this.types[d.uniqueId()] = d);

    const new_nodes = Object.values(bound_ont.entities).map(obj => new VertexRW(this,obj)); 
    new_nodes.forEach(d => this.vertices[d.uniqueId()] = d);
    // new_nodes.forEach(d => d.setSubClass()); 
 
    const new_links = Object.values(bound_ont.relations).map(obj => new EdgeRW(this,obj));
    new_links.forEach(d => this.edges[d.uniqueId()] = d);
  
    new_nodes.forEach(d => d.refreshCache(this));
    new_links.forEach(d => d.refreshCache(this));

    return this;

  }

  addNode(entitySpec) {
    const new_entity = Ontology.getDefault().addEntity(entitySpec);
    const new_vertex = new VertexRW(this,new_entity);
    new_vertex.setTypeSpec(this.types.default);
    return this.vertices[new_vertex.uniqueId()] = new_vertex;
  }

  addLink(fromNode, toNode, edgeType, base=null) { 

    const obj = {
    keys: {
        uidDatumFrom: fromNode.uniqueId(),
        uidDatumTo:   toNode.uniqueId(),
        uidTypeSpec:  edgeType.uniqueId(),
        uidBase:      base?.uniqueId(),
        xidRelnType:  base?.keyId()

    const new_edge = new EdgeRW(this,obj);
    this.edges[new_edge.uniqueId()] = new_edge;
    this.refreshAllCaches();
    return new_edge;
  }

//============================================================

class Ontology {

  constructor(obj) {  // cannot be async
    Object.assign(this,obj);
  }

  //----------------------------------------------------------

  uniqueId() { return this.uid; }
  toString() { return this.file.name; }
  getEntityType(str) { return this.classes[str] ?? (this.classes[str] = new EntityType(str,this)) }
  getRelationType(str) { return this.predicates[str] ?? (this.predicates[str] = new RelationType(str,this)) }
  getEntity(str) { return this.entities[str] ?? (this.entities[str] = new Entity(str,this)).bind(this) }
  addEntity(obj,key) { 
      key = key ?? obj.xid ?? obj.id;
      const e = new Entity(obj,this);
      e.bind(this); 
      this.entities[key] = e;
      return e;
    }
  //----------------------------------------------------------
  
  // REQUIRES that .baseFrom, .baseTo and .baseType are ALREADY defined in relationSpec
  // i.e it is called from Workbook.addLink()
  addRelation(relationSpec) { 
    // 

    const nr = new Relation(relationSpec,this);
      this.relations[nr.keyId()] = nr;
    return nr;
  }

// note: Relation.bind(ont) will bind within ont only, using local keys. 
// Here we want to bind across all ontologies 
// which is best done with object references. 


  //----------------------------------------------------------
  // constructors cannot use async functions
  static async createfromJson(file) {
    const json = await read_json_file(file);
    return Ontology
      .conformJson(json,file) // static method, calls class constructor
      .addBindings();
  }

  //----------------------------------------------------------
  
  // all newly-created Entity & Relation objects will be maintained together in one container
  // It could be one of the source ontologies, but for now assume output will be a different file.
  // TODO might also be the output destination for ALL Graph, Node and Link objects?
  // I think it's cleaner to save each Graph as a separate JSON file, which stores the path of each input Ontology
  static outputOntology = new Ontology({uid: '_NEW', file: {}, metadata: {}, entities: {}, relations: {}, classes: {}, predicates: {}});

  static getDefault() { return Ontology.outputOntology; }
//----------------------------------------------------------
  
  static conformJson(json,file) {
    // re-align high-level parsed JSON structure ready for type-casting and binding 
    // LLMs don't always follow a standard structure & naming convention... 
    // Here we cater for a few variants encountered so far

    const 
      name = file.name,
      uid = hashString(file.name),
      source = new Source(file,'Ontology'),
      entities = json.entities ?? json.ontology.entities ?? {},
      relations = json.relations ?? json.ontology.relationships ?? {},
      classes = json.classes ?? json.ontology.classes ?? {},
      predicates = json.predicates ?? json.ontology.relations ?? {}; // Copilot uses 'relations' in 2 different ways
      source.metadata = json.metadata ?? {};

    return new Ontology({name, source, entities, relations, classes, predicates, uid}) ;

  }
//----------------------------------------------------------

  addBindings() {

    // given aligned ontology structure, add local object bindings based on (raw source) lookup keys
    // First step is to convert each dict to an array of [key,obj] entries
    // Then cast the generic objects into custom classes that implement .keyId()
    // Then strongly bind all objects within this ontology

    const ont = this;

    if (Array.isArray(ont.entities)) // assumes it's an array of objects (not key-value pairs)
      ont.entities = ont.entities.map(obj => new Entity(obj,ont)); 
    else { // assume dict of Objects, with keys that must be preserved to enable binding
      ont.entities = Object.entries(ont.entities) // convert dict to array of [key,obj] pairs
          .map(([key,obj]) => new Entity(obj,ont,key)); // simple array of Entities
    }
    ont.entities = ont.entities.map(obj => [obj.keyId(),obj]);
    ont.entities = Object.fromEntries(ont.entities); // convert to a hashtable ready to support binding

    //----------------------------------------------------------
    ont.relations = ont.relations.map(obj => new Relation(obj,ont));
    ont.relations = ont.relations.map(obj => [obj.keyId(),obj]); 
    ont.relations = Object.fromEntries(ont.relations);

    //----------------------------------------------------------

    if (Array.isArray(ont.classes)) {
      ont.classes = ont.classes.map(obj => new EntityType(obj,ont)); 
      ont.classes = ont.classes.map(obj => [obj.keyId(),obj]);  
    } else { // derive from Entities
     ont.classes = Object.values(ont.entities).map(obj => obj.typeId()); 
     ont.classes = [...new Set(ont.classes)]; // de-dupe the array - may be redundant?
     ont.classes = ont.classes.map(str => [str,new EntityType(str,ont)]);  
    }
    ont.classes = Object.fromEntries(ont.classes);

    //----------------------------------------------------------

    if (Array.isArray(ont.predicates)) {
      ont.predicates = ont.predicates.map(obj => new RelationType(obj,ont)); 
      ont.predicates = ont.predicates.map(obj => [obj.keyId(),obj]);  
      } else { // derive from Relations
      ont.predicates = Object.values(ont.relations).map(obj => obj.typeId()); 
      ont.predicates = [...new Set(ont.predicates)]; // de-dupe the array
      ont.predicates = ont.predicates.map(str => [str, new RelationType(str,ont)]);  
    }
    ont.predicates = Object.fromEntries(ont.predicates);
    //----------------------------------------------------------
    Object.values(ont.entities).forEach(ent => ent.bind(ont));
    Object.values(ont.relations).forEach(rel => rel.bind(ont));

    return ont;

  }
}

// 'mixin' used by VertexRW and HyperEdgeRW 

const EditableVertex = Base => class extends Base {
  // add all Vertex RW methods 

  // can it include a constructor?
  constructor(graph,obj) {
    super();
    this.base = obj; // Entity
    console.assert(graph instanceof Workbook);
    WeakBind.parentOf.set(this,graph);

    // capture robust keys to enable re-binding eg after ontology is refreshed
    
    this.keys = {
      uidEntity: this.base ? this.base.uniqueId() : hashString(RandomId('N')),
      xidEntityType: this.base ? this.base._type.keyId() : null,
      uidVertexType: this.base ? this.base._type.uniqueId() : 'default'
   };

     this._cache = {
      vertsSuper: [],
      vertsSub: [],
      edgesIn: [],
      edgesOut: [],
      vertexType: graph.types.default,
    };

    this.bind(graph); // ASSUMES graph.types is already populated

  }
// TODO: re-bind after ontology is reloaded.

  setCaption(txt) { this.caption = txt; return this; }
  setJunction(flag) { 
    if (flag || this.is_junction) this.is_junction = flag;
    Object.setPrototypeOf(this, flag ? HyperEdgeRW.prototype : VertexRW.prototype);  
    return this;
  }

  getWorkbook() { return WeakBind.parentOf.get(this) }
  

  restorePrototypes(graph) { 
    graph.restoreObjectAs(this.base,Entity); 
    if (this.keys.uidImages) this.keys.uidImages = new Set(this.keys.uidImages);
    this._cache = {};
    this.setJunction(this.is_junction);
  }

  // standardised method name called via restorePrototypes() helper function
  restoreBindings(graph) { 
    this.bind(graph);
    //   this.setSubClass();
    // this.refreshCache(graph); // not until all links are fully restored
  }

  bind(graph) { // rehydrate static bindings 
    this._cache.vertexType = graph.types[this.keys.uidVertexType] ?? graph.types.default;
  }

  getTemplate() { return this.getTypeSpec().getTemplate() }

  getTypeSpec() { return this._cache.vertexType }

  setTypeSpec(vertexType) {
    this._cache.vertexType = vertexType;
    this.keys.uidVertexType = vertexType?.uniqueId();  // otherwise rehydration fails
    return this;
  }

  setImage(obj) { 
    if (!this._cache.images) this._cache.images = {};
    if (!this.keys.uidImages) this.keys.uidImages = new Set();
    this._cache.images[obj.uniqueId()] = obj;
    this.keys.uidImages.add(obj.uniqueId());
    return this;
 }

  addEnclosure(graph) { // create a parent contour vertex encapsulating just this vertex
    const 
      pVertex = graph.addNode({id:RandomId('N')}, graph.types.contour), 
      pEdge = graph.addLink(this,pVertex,graph.types.partOf);
    return pVertex;
  }

  refreshCache(graph) {
    const 
      vertsSuper = graph.linkData().filter(d => d.subVertex() == this).map(d=>d.superVertex()),
      vertsSub = graph.linkData().filter(d => d.superVertex() == this).map(d=>d.subVertex()),
      edgesIn = graph.linkData().filter(d => d.toVertex() == this),
      edgesOut = graph.linkData().filter(d => d.fromVertex() == this),
      vertexType = graph.types[this.keys.uidVertexType],
      images = this.keys.uidImages ? Array.from(this.keys.uidImages).map(uid => graph.images[uid]) : undefined;

    this._cache = {
      vertsSuper,
      vertsSub,
      edgesIn,
      edgesOut,
      vertexType
    };

    if (images) this._cache.images = images;

  }

  allSuperNodeData() {
// assumes this._cache is up to date
    return this._cache.vertsSuper;

  }


 }

//============================================================
// a list of object (link and node) types that share the same CSS class & default styling
// also drives non-CSS default attributes such as image URL, initial transform, nestable, default cloaking etc.

class TemplateSpec { // aka Template
  constructor(graph,class_name) {
    const obj = {
      class_name: class_name,
      types: new Set([class_name]),
      nesting: { 
          reversed: false, // true <=> the 'from' node is logically the subnode/element in each pair (normally the container/superset)
          min_subnodes: 3, // restores (expands) as vertex-edge graph (NOT as frame or contour) unless N direct subnodes would be visible
          max_subnodes: 0, // by default, minimise (collapse) any supernode if more than N direct subnodes would be visible
          max_supernodes: 2, // per subnode. Input validation rule: eg "a Person can have no more than 2 biological Parents" 
      },
      junction: { // extra settings for a 'junction dot' (and its 'hyperedge' expansion)
          edgeTypes: { in: [], out: [] } // eg { in:[ mother,father], out: [daughter,son] }
      },
      colour: {  
          fill: 'white',
          stroke: 'black'
      },
      image: graph.getDefaultImage(),
      margin: { banner: 30, stub: 30, default: 5 },
      state: { 
        phase: Phase.LIQUID,
        shape: Shape.ICON,
        light: Light.BACK
       },


      uid: hashString(RandomId('T'))
    }
    Object.assign(this,obj);
    WeakBind.parentOf.set(this,graph);
    return this;
  }

  restorePrototypes(graph) { 
    graph.restoreObjectAs(this.image,Image); 
    this.types = new Set(this.types); 
  }

  uniqueId() { return this.uid }

  addAliases(aliases) { 
    aliases.forEach(str => this.types.add(str));  
    return this;
    
  }
  appliesTo(str) { return this.types.has(str) }

}

class Entity {
  constructor(obj,ont,key=null) { 

    WeakBind.parentOf.set(this,ont);

    if (typeof obj === "string") { // convert it to a generic precursor object
      obj = {
          key: obj,
          name: obj,
          description: 'Not found in source JSON file',
          type: 'Entity'
          }
        }

    Object.assign(this, obj); 

    // align property names

    this.xid = this.id ?? key ?? obj.name ?? RandomId('E');
    this.uid = hashString(this.xid + ont.uid);
    this.txtName = this.name ?? this.label ?? this.xid;
    this.txtNote = this.labels ?? this.description ?? this.role ?? (this.properties ? Object.entries(this.properties) : '');
    
  }
  typeId() { return this.type ?? this.class ?? 'Entity'; }
  keyId() { return this.xid } // for local binding within this ontology
  uniqueId() { return this.uid } // used by d3, and to safely bind across ontologies without name collisions
  bind(ont) { this._type = ont.getEntityType(this.typeId()); return this; }
  toString() { return `${this.txtName}: ${this.txtNote}` } // VertexRW.toString() will add descriptor via _datumType
  getName() { return this.txtName }
  
  getOntology() { return WeakBind.parentOf.get(this) }
}

class Relation {

  constructor(obj,ont) {
    Object.assign(this, obj);
    WeakBind.parentOf.set(this,ont);

    this.keys = {
      xid: obj.key ?? RandomId('R'),
      // standardise keys for local binding within ontology
      xidEntityFrom: this.subject ?? this.from ?? this.sourceEntity,
      xidEntityTo: this.object ?? this.to ?? this.targetEntity,
      xidRelnType: this.predicate ?? this.type ?? this.cardinality ?? 'Relation'
      };

    this.keys.uid = hashString(this.keys.xid + ont.uid);
    }

  keyId() { return this.keys.xid }
  uniqueId() { return this.keys.uid } 
  toString() { return `${this._baseFrom.toString()} | ${this._baseType.toString()} | ${this._baseTo.toString()}` }

  // adapt to various names/structures found in the source JSON ontology 

  typeId() { return this.keys.xidRelnType }
  fromId() { return this.keys.xidEntityFrom }
  toId() { return this.keys.xidEntityTo }
  bind(ont) { 
    this._baseFrom = ont.getEntity(this.fromId());
    this._baseTo = ont.getEntity(this.toId());
    this._baseType = ont.getRelationType(this.typeId());
  }

  getOntology() { return WeakBind.parentOf.get(this) }

}

// each Relation may be referenced in many Workbooks
// Workbook-level 
class EdgeRW extends Edge {  
 constructor(graph,obj) {
    super();
    if (obj instanceof Relation) {
      this.base = obj; 
      this.collectKeys(graph);

    } else if (obj instanceof EdgeRW) {
      // copy keys by value
      this.keys = {...obj.keys, uidThis: hashString(RandomId('L'))};
      }
    this._cache = this.cache ?? {};
    this.restoreBindings(graph); 
    
    this.y = Math.random(); // just for randomly assigning into PathSpecs
    WeakBind.parentOf.set(this,graph);

 }
  toString() { return `${this._cache.vertFrom.toString()} | ${this._cache.edgeType.toString()} | ${this._cache.vertTo.toString()}` } 
  
  setTypeSpec(edgeType) { 
    this._cache.edgeType = edgeType; 
    this.keys.uidTypeSpec = edgeType?.uniqueId();  // otherwise rehydration fails
    return this;
   }

  uniqueId() { return this.keys.uidThis } 

  restorePrototypes(graph) { 
    if (this.base) graph.restoreObjectAs(this.base,Relation); 
    this._cache = this._cache ?? {};

  }

  restoreBindings(graph) { 
      // start with the "edit-resistant" references
      this._cache.vertFrom = graph.vertices[this.keys.uidDatumFrom];
      this._cache.vertTo = graph.vertices[this.keys.uidDatumTo];
      // now for the edit-sensitive parts
      this._cache.edgeType = graph.types[this.keys.uidTypeSpec];
      this.refreshCache(graph); 
  }

  collectKeys(graph) {  // TODO: use _vertFrom instead of base 
    // capture robust keys to enable re-binding eg after ontology is refreshed
    // TODO: for now, the primary key (uidThis) doesn't change even after endpoints are modified
    // => user edits could result in logically identical links with distinct uids.  Is that reasonable?
    // I think there should be an immediate "duplicate key violation" error if they try that.
    const saved_uidThis = this.keys ? this.keys.uidThis : null;

    if (this.base && this.base._baseFrom)
      this.keys = {
        uidDatumFrom: this.base._baseFrom.uniqueId(),
        uidDatumTo:   this.base._baseTo.uniqueId(),
        uidTypeSpec:  this.base._baseType.uniqueId(),
        uidBase:      this.base.uniqueId(),
        xidRelnType:  this.base._baseType.keyId()

      };
  
  // in case this edge has been modified, we need to override with the current to & from vertices (not rely on original base)
    if (this._cache?.vertFrom) 
      this.keys = {
        uidDatumFrom: this._cache.vertFrom.uniqueId(),
        uidDatumTo:   this._cache.vertTo.uniqueId(),
        uidTypeSpec:  this._cache.edgeType.uniqueId()
      };

    this.keys.uidThis = saved_uidThis ?? hashString(this.keys.uidDatumFrom + this.keys.uidDatumTo + this.keys.uidTypeSpec);

  }

  getWorkbook() { return WeakBind.parentOf.get(this) }

//-----------------------------------------------

  // _cache = discardable, transient state data, derived values, subtotals, shortcuts etc 
  // anything that's free to change with user clicks (but often needed, eg during simulation ticks)
  // except the "edit-resistant" ones that require extra care (_vertFrom etc.)
  refreshCache(graph) { 
    const
      vertSuper = this.superVertex(),
      vertSub = this.subVertex(),
      edgeType =  graph.types[this.keys.uidTypeSpec],
      vertFrom = this.fromVertex(),
      vertTo = this.toVertex();

    //  superNodeData =  this.allSuperNodeData(); // circular dedependency during rehydration

    this._cache = {
      vertSuper,
      vertSub,
      edgeType, 
      vertFrom, 
      vertTo
      }

    return this;
  }

//-----------------------------------------------

  copyTo(graph) {
    console.assert(graph instanceof Workbook);
    const obj = new EdgeRW(graph,this);
    obj.keys.uidThis = hashString(RandomId('L'));  // needs a new uid to avoid overwriting
    graph.edges[obj.uniqueId()] = obj;
    return obj;
  }
//-----------------------------------------------
// returns a union of supernodes that directly contain either endpoint of this link (or both)
// called e.g. from this.interjectNode() & this.refreshCache()
// not counting the endpoints themselves
// ASSUMES each VertexRW already has an accurate _cache object
  allSuperNodeData() {
    const 
      p1 = this._cache.vertFrom.allSuperNodeData(),
      p2 = this._cache.vertTo.allSuperNodeData(),
      s = new Set([...p1,...p2]);
    return Array.from(s);
  }
//-----------------------------------------------

  superVertex() { // which one of this link's pair of endpoints is actually the container superset? (if applicable) 
    // after adjusting for 'reversed' predicates, and disregarding any non-hiearchical predicates
    // by convention arrow is FROM superset TO subelement
    const nesting = this._cache.edgeType._cache.template.nesting;
    if (nesting.enabled) return nesting.reversed ? this._cache.vertTo : this._cache.vertFrom;
    return null;
    }
//-----------------------------------------------

  subVertex() { // which one of this link's 2 endpoints is actually the nested subelement? (if applicable) 
    const nesting = this._cache.edgeType._cache.template.nesting;
    if (nesting.enabled) return nesting.reversed ? this._cache.vertFrom : this._cache.vertTo;
    return null;
    }

    // TODO: adjust for reversal flag, for Fan edges . reversal is not just for hierarchies
  fromVertex() { return this._cache.vertFrom }

  toVertex() { return this._cache.vertTo }

//-----------------------------------------------
// insert jnode as 'elbow' (involves splitting this link into 2)
// if jnode is not provided, we create a new one on the spot 
// either way, jnode is then cast as LiquidDot 
// if this link is already part of a hyperedge, we add jnode to that hyperedge (=> it becomes a compound hyperedge)
// else, create a new hyperedge (in parent graph) and add to that (=> true hyperedge)
// also (just for performance) bind this link (and the new bit) to the hyperedge



/// BUT WAIT!!  Default action should NOT assume it's a junction + hyperedge scenario
// we just want a generic node inserted here. Simple.
// Then an optional Node method to turn it into a junction + (new) hyperedge? Not even that..
// the generic elbow junction starts as a tiny circle (empty container) but can be expanded to reveal a mini-DAG 
// just like a fixed or floating supernode - except the minimised shape is a "junction dot" (small circle)
// AND all external links select/deselect as one
// when expanded, the contour behaves like any other.
// a hyperedge is nothing more than a rect/contour that collapses into something tiny AND selects all its external edges

// similar to Windows, each node can be maximised (whole screen), restored (contour or frame), minimised (logo icon)
// But ALSO a 'junction' (dot) - smaller than icon, and with its own distinct behaviour
// rendered in the same foreground layer as polylines - during drag, can appear in front of icons etc.
// its external links select/deselect as one. (i.e, just like a hyperedge)
// or.. click one of its INWARD arrows, autoselects all the OUTWARD arrows FROM that dot (and vice versa)
// other inward arrows remain unselected (unless the shift key is down, this causes all to select - as usual)
/// this ONLY happens when the node status is "junction dot"
// but NOT in paths. A path definition should be immune to node's current status.

// when maximised (whole screen) it means everything not (fully?) inside is cloaked & inert
// so a scene, episode or study is 'just' another type of maximised node.
// only a few differences. eg sequencing of "scenes" within "episodes", within 'series' within 'shows'.
// with time sequence being either absolute or relative to context frame.

  interjectNode(jnode=null,graph) {
    console.assert(jnode == null || jnode instanceof VertexRW);  
    if (jnode == null) { 
      jnode = graph.addNode({id:RandomId('J')});
      jnode.setJunction(true);
      jnode.setCaption(`${this._cache.vertFrom.getName()} to ${this._cache.vertTo.getName()}`);
    } else { // check the existing jnode is safe to insert here...
      console.assert(jnode != this._vertFrom);
      console.assert(jnode != this._vertTo);

    }


    if (jnode._cache.vertexType == graph.types.default) // seems reasonable to propagate link type 
      jnode.setTypeSpec(this._cache.edgeType); 

    // TODO: add the new jnode to ALL the same parents as this.
    // if the link straddles 2 non-identical sets of supernode parents, the new jnode is 'adopted' by all of them
    // that means their contours will suddenly have a non-empty intersection. Seems reasonable.


    const link2 = this.copyTo(graph); // TODO: clone ALL its properties including paths, layer, & scenes bindings
    // now interject by rebinding 1 endpoint each - remember to update our keyring!
    link2._cache.vertFrom = jnode;
    this._cache.vertTo = jnode;
    link2.collectKeys(); 
    this.collectKeys(); 
    graph.refreshAllCaches();
    
    console.log('EdgeRW.interjectNode() jnode,this,link2',jnode,this,link2)
    return jnode;
  }

}
