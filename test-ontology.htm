function hashString(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = (h * 33) ^ str.charCodeAt(i);
  }
  return (h >>> 0)        // force unsigned 32‑bit
        .toString(16)     // convert to hex
        .padStart(8,'0'); // leading zeroes to 8 spaces
}

// WeakMap is a good way to store child->parent reverse lookups - helps prevent memory leaks 
// think of it as disabling foreign key constraints
// eg from (child) Entity to (parent) Ontology 
// If every Entity was strongly bound to its Ontology then garbage collection would never happen
// With WeakMap, If the key (child) becomes "unreachable" then the mapping disappears automatically
// maybe even Datum->Entity? 

//============================================================

class WeakBind {
  static parentOf = new WeakMap();
  static attach(parent, key, child) {
    parent[key] = child;
    WeakBind.parentOf.set(child, parent);
  }
}

class Workbook {  // includes formatting info as well as data & forces

  constructor(obj=null) {
    if (obj) {
      Object.assign(this,obj);
      // TODO: rehydrate

    }
    else {
      this.name = 'New Workbook';
      this.nodes = {};
      this.links = {};
      this.linkTypes = {default: new LinkType({xid:'Unknown'},this)};

      this.images = {default: new Image('tba.svg',this)};
      this.layers = {default: new LayerDatum('default',this)};
      this.forces = {};  
      this.scenes = {};
      this.episodes = {};
      this.sources = {};
      this.studies = {}; // aka narratives, storylines, threads
    }

  this.uid = this.uid ?? hashString(Math.random().toString());

  }

//------------------------------------------------------------------\

  // expose the nodes and links as datum arrays as expected by D3.
  nodeData() { return Object.values(this.nodes) }
  linkData() { return Object.values(this.links) }
  uniqueId()  { return this.uid };

//------------------------------------------------------------------\

// TODO: misnomer, in that "json" is already an object - just needs to be rehydrated.
// 2 steps, rehydrate the json object first, then fold it into this graph
// should be 2 distinct methods

  hydrate() {
    // always called when loading from a saved graph (.fdg file), *or* from an external JSON (.ont) source
    // all underscore-prefixed object references within this graph need to be re-constituted based on their uid keys
    // If the matching source is not already in memory, then tell user they need to upload it manually.
    // or they can click to accept the old values.
    // once hydrated, assign appropriate class prototypes to each object
    // once done, the newly-hydrated Workbook is ready to use

  }

// to do: upsert this graph from another (hydrated) graph already in the workspace


  upsertFromFdg(json,source) { 
            // .conformJson(json) 
            // .addBindings();
    // TODO : replace these with proper upsert 

    this.forces = json.forces;  


    // TODO : how best to handle embedded js model
//    if (!source) source = new Source(file,'Workbook',json.metadata);
    if (source.fileName) this.name = source.fileName; 
    this.sources[source.uniqueId()] = source;
    Object.values(json.sources ?? {}).forEach(d => {
      Object.setPrototypeOf(d,Source.prototype);
      this.sources[d.uniqueId()] = d;
      } 
    );
  
    // ingest new layers
    Object.values(json.layers).forEach(d => {
      Object.setPrototypeOf(d,LayerDatum.prototype);
      Object.setPrototypeOf(d.image,Image.prototype);
      d.types = new Set(d.types);
      this.layers[d.uniqueId()] = d;
      }
    );

    // ingest new nodeTypes (required before adding nodes)

    Object.values(json.nodeTypes).forEach(d => {
      Object.setPrototypeOf(d,NodeType.prototype);
      this.nodeTypes[d.uniqueId()] = d;
      }
    );

    // ingest new Images
    Object.values(json.images ?? {}).forEach(d => {
      Object.setPrototypeOf(d,Image.prototype);
      this.images[d.uniqueId()] = d;
      }
    );


    // ingest new linkTypes (required before adding links)
    Object.values(json.linkTypes).forEach(d => {
      Object.setPrototypeOf(d,LinkType.prototype);
      this.linkTypes[d.uniqueId()] = d;
      }
    );

// TODO: ingest new Scenes, Episodes, Studies

  // apply classes without executing constructors and immediately insert/replace
  // any existing nodes with the same uid => VOIDS any unsaved edits
  // the graph's other nodes are left untouched

    Object.values(json.nodes).forEach(d => {
      Object.setPrototypeOf(d,NodeDatum.prototype);
      Object.setPrototypeOf(d.base,Entity.prototype);
      if (d.images) Object.values(d.images).forEach(img => Object.setPrototypeOf(img,Image.prototype));
      d.bindLayer(this);
      d.bind(this); // explicit, because we bypassed the constructor!
      d.setSubClass(); 
      this.nodes[d.uniqueId()] = d;
      }
    ); 

    Object.values(json.links).forEach(d => {
      Object.setPrototypeOf(d,LinkDatum.prototype);
      Object.setPrototypeOf(d.base,Relation.prototype);
      d._datumFrom = this.nodes[d.keys.uidDatumFrom];
      d._datumTo = this.nodes[d.keys.uidDatumTo];
      d._linkType = this.linkTypes[d.keys.uidLinkType];
      d.bindLayer(this);
      // d.bind(this); // TODO: use a rehydration method instead.
      this.links[d.uniqueId()] = d;
      }
    );

    return this;

  }

  //------------------------------------------------------------------

  addBindings() {

  }

//------------------------------------------------------------------

  addLayer(obj,aliases=[]) { 
    if (typeof obj == 'string') obj = new LayerDatum(obj,this);
    this.layers[obj.uniqueId()] = obj;
    obj.addAliases(aliases);
    return this;
  }

//------------------------------------------------------------------

  addImage(obj) { 
    if (typeof obj == 'string') obj = new Image(obj,this);
    this.images[obj.uniqueId()] = obj;
    return obj;
  }

  getDefaultImage() { return this.images.default }

//------------------------------------------------------------------

  addNodeType(obj) { 
    if (typeof obj == 'string') obj = new NodeType(obj,this);
    this.nodeTypes[obj.uniqueId()] = obj;
    return this;
  }

  //------------------------------------------------------------------
  
  getLayer(type_name) {
    const found = Object.values(this.layers)
      .filter(sg => sg.appliesTo(type_name));

    if (found.length == 0) return this.layers.default;
    else return found[0]; // just the first one 
  }

  //------------------------------------------------------------------

  getNodeType(type_name) {
    const found = Object.values(this.nodeTypes)
      .filter(nt => nt.nameMatches(type_name));

    if (found.length == 0) return this.nodeTypes.default; // created during constructor
    else return found[0]; // just the first one 
  }

  //------------------------------------------------------------------

  getLinkType(type_name) {
    const found = Object.values(this.linkTypes)
      .filter(lt => lt.nameMatches(type_name));

    if (found.length == 0) return this.linkTypes.default; // created during constructor
    else return found[0]; // just the first one 
  }

  //------------------------------------------------------------------

  bindAllLayers() { // to be invoked after user-initiated change of type-to-layer mapping
    this.nodeData().forEach(d => d.bindLayer(this));
    this.linkData().forEach(d => d.bindLayer(this));
    return this;
    }

  //------------------------------------------------------------------

  bindAll() { // one-time re-hydration
    this.nodeData().forEach(d => d.bind(this));
    this.linkData().forEach(d => d.bind(this));
    return this;
    }

  //------------------------------------------------------------------

  downloadFdg(to_filename=null) {

    to_filename = to_filename ?? this.name + '.fdg';

    const exclude_regex = new RegExp('^_', "i"); 

    const json = JSON.stringify(this, (key, value) => { 
        if (exclude_regex.test(key)) return undefined; // skip keys that start with underscore
        else {
          if (value instanceof Set) return [...value]; // convert
          if (typeof value === 'number') return Math.round(value*10000)/10000;
          else return value; 
          } 
        }, 2 );

    const fdg_script = `Workspace.loadGraph('${this.uniqueId()}','${to_filename}','${Date()}',` + json + ');' ;

    const blob = new Blob([fdg_script], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = to_filename;
    a.click();

    URL.revokeObjectURL(url);
  }

  //----------------------------------------------------------

  mergeOntology(bound_ont) { 

    //console.log("mergeOntology(bound_ont)",bound_ont);  

    this.sources[bound_ont.source.uniqueId()] = bound_ont.source;


    const new_nodeTypes = Object.values(bound_ont.classes).map(obj => new NodeType(obj,this)); 
    new_nodeTypes.forEach(d => this.nodeTypes[d.uniqueId()] = d);

    const new_linkTypes = Object.values(bound_ont.predicates).map(obj => new LinkType(obj,this)); 
    new_linkTypes.forEach(d => this.linkTypes[d.uniqueId()] = d);

    const new_nodes = Object.values(bound_ont.entities).map(obj => new NodeDatum(obj,this)); 
    new_nodes.forEach(d => this.nodes[d.uniqueId()] = d);
    new_nodes.forEach(d => d.setSubClass()); // prototype does change, but not reflected in Edge DevTools console
    
    const new_links = Object.values(bound_ont.relations).map(obj => new LinkDatum(obj,this));
    new_links.forEach(d => this.links[d.uniqueId()] = d);
  
    return this;

  }

  //---------------------------------------------------------------------------------

  addNode(entitySpec,nodeType) {
    const new_entity = Ontology.getDefault().addEntity(entitySpec);
    const new_NodeDatum = new NodeDatum(new_entity,this);
    new_NodeDatum.setNodeType(nodeType);
    return this.nodes[new_NodeDatum.uniqueId()] = new_NodeDatum;
  }

  //---------------------------------------------------------------------------------

  addLink(relationSpec,linkType) { 
    const new_relation = Ontology.getDefault().addRelation(relationSpec);
    const new_LinkDatum = new LinkDatum(new_relation,this);
    new_LinkDatum.setLinkType(linkType);
    return this.links[new_LinkDatum.uniqueId()] = new_LinkDatum;
  }

  //---------------------------------------------------------------------------------

}

class Ontology {

  constructor(obj) {  // cannot be async
    Object.assign(this,obj);
  }

  //----------------------------------------------------------

  uniqueId() { return this.uid; }
  toString() { return this.file.name; }
  getEntityType(str) { return this.classes[str] ?? (this.classes[str] = new EntityType(str,this)) }
  getRelationType(str) { return this.predicates[str] ?? (this.predicates[str] = new RelationType(str,this)) }
  getEntity(str) { return this.entities[str] ?? (this.entities[str] = new Entity(str,this)).bind(this) }
  addEntity(obj,key) { 
      key = key ?? obj.xid ?? obj.id;
      const e = new Entity(obj,this);
      e.bind(this); 
      this.entities[key] = e;
      return e;
    }
  //----------------------------------------------------------
  
  // REQUIRES that .baseFrom, .baseTo and .baseType are ALREADY defined in obj
  // i.e it is called from Workbook.addLink()
  addRelation(relationSpec) { 
    // 

    const nr = new Relation(relationSpec,this);
      this.relations[nr.keyId()] = nr;
      //this.relations.push() .. it's not an array
    return nr;
  }

// note: Relation.bind(ont) will bind within ont only, using local keys. 
// Here we want to bind across all ontologies 
// which is best done with object references. 


  //----------------------------------------------------------
  // constructors cannot use async functions
  static async createfromJson(file) {
    const json = await read_json_file(file);
    return Ontology
            .conformJson(json,file) // static method, calls class constructor
            .addBindings();
  }



  //----------------------------------------------------------
  
  // all newly-created Entity & Relation objects will be maintained together in one container
  // It could be one of the source ontologies, but for now assume output will be a different file.
  // TODO might also be the output destination for ALL Graph, Node and Link objects?
  // I think it's cleaner to save each Graph as a separate JSON file, which stores the path of each input Ontology
  static outputOntology = new Ontology({uid: '_NEW', file: {}, metadata: {}, entities: {}, relations: {}, classes: {}, predicates: {}});

  static getDefault() { return Ontology.outputOntology; }
//----------------------------------------------------------
  
  static conformJson(json,file) {
    // re-align high-level JSON structure in preparation for type-casting and binding 
    // LLMs don't always follow a standard JSON structure & naming convention... 
    // Here we cater for a few variants encountered so far

    // TODO: check - does it even look like an ontology? Maybe it's a graph?

    const 
      name = file.name,
      uid = hashString(file.name),
      source = new Source(file,'Ontology'),
      entities = json.entities ?? json.ontology.entities ?? {},
      relations = json.relations ?? json.ontology.relationships ?? {},
      classes = json.classes ?? json.ontology.classes ?? {},
      predicates = json.predicates ?? json.ontology.relations ?? {}; // Copilot uses 'relations' in 2 different ways
      source.metadata = json.metadata ?? {};

    return new Ontology({name, source, entities, relations, classes, predicates, uid}) ;

  }
//----------------------------------------------------------

  addBindings() {

    // given aligned ontology structure, add local object bindings based on original lookup keys
    // First step is to convert each dict to an array of [key,obj] entries
    // Then cast the generic objects into custom classes, which can generate the approriate local key id
    // Finally use those local keys to strongly bind all objects within this ontology

    const ont = this;

    if (Array.isArray(ont.entities)) // assumes it's an array of objects (not key-value pairs)
      ont.entities = ont.entities.map(obj => new Entity(obj,ont)); 
    else { // assume dict of Objects, with keys that must be preserved to enable binding
      ont.entities = Object.entries(ont.entities) // convert dict to array of [key,obj] pairs
          .map(([key,obj]) => new Entity(obj,ont,key)); // simple array of Entities
    }
    ont.entities = ont.entities.map(obj => [obj.keyId(),obj]); // use class method to get key
    ont.entities = Object.fromEntries(ont.entities); // convert to a hashtable ready to suppoprt binding

    //----------------------------------------------------------
    ont.relations = ont.relations.map(obj => new Relation(obj,ont));
    ont.relations = ont.relations.map(obj => [obj.keyId(),obj]);  // use class method to get key
    ont.relations = Object.fromEntries(ont.relations);

    //----------------------------------------------------------

    if (Array.isArray(ont.classes)) {
      ont.classes = ont.classes.map(obj => new EntityType(obj,ont)); 
      ont.classes = ont.classes.map(obj => [obj.keyId(),obj]);  
    } else { // derive from Entities
     ont.classes = Object.values(ont.entities).map(obj => obj.typeId()); 
     ont.classes = [...new Set(ont.classes)]; // de-dupe the array - may be redundant?
     ont.classes = ont.classes.map(str => [str,new EntityType(str,ont)]);  
    }
    ont.classes = Object.fromEntries(ont.classes);

    //----------------------------------------------------------

    if (Array.isArray(ont.predicates)) {
      ont.predicates = ont.predicates.map(obj => new RelationType(obj,ont)); 
      ont.predicates = ont.predicates.map(obj => [obj.keyId(),obj]);  
      } else { // derive from Relations
      ont.predicates = Object.values(ont.relations).map(obj => obj.typeId()); 
      ont.predicates = [...new Set(ont.predicates)]; // de-dupe the array
      ont.predicates = ont.predicates.map(str => [str, new RelationType(str,ont)]);  
    }
    ont.predicates = Object.fromEntries(ont.predicates);
    //----------------------------------------------------------
    Object.values(ont.entities).forEach(ent => ent.bind(ont));
    Object.values(ont.relations).forEach(rel => rel.bind(ont));

//    console.log(ont);

    return ont;

  }
}

class NodeDatum { 

  constructor(obj,graph) {
    this.base = obj; // Entity
    this.x = Math.random(); // same Entity can appear across many views each with its own NodeDatum (x,y,fx,fy,width etc.)
    WeakBind.parentOf.set(this,graph);

    // capture robust keys to enable re-binding eg after ontology is refreshed
    this.keys = {
      uidEntity: this.base.uniqueId(),
 //     uidEntityType: this.base._type.uniqueId(),
      xidEntityType: this.base._type.keyId(),
      uidNodeType: this.base._type.uniqueId() 
  
    }

    this.bind(graph); // ASSUMES graph.nodeTypes is already populated
    this.bindLayer(graph);

  }
// TODO: re-bind after ontology is reloaded.

  uniqueId() { return this.keys.uidEntity } // must be same as Entity, otherwise LinkDatum binding will require extra indirection
  toString() { return `${this._nodeType.toString()}: ${this.base.toString()}` }
  getParent() { return WeakBind.parentOf.get(this) }

  bindLayer(graph) { // can vary during session if user edits type-to-layer mapping rules
    this._datumLayer = graph.getLayer(this.base.typeId()); // TODO: should use _nodeType in case of name collision
    return this;
  }

  bind(graph) { // static bindings
    this._nodeType = graph.nodeTypes[this.keys.uidNodeType];
    // why doesn't that key exist already in nodeTypes? is it simply being called too soon? 
    //console.assert(this._nodeType);

  }

  setNodeType(nodeType) {
    this._nodeType = nodeType;
    this.keys.uidNodeType = nodeType.uniqueId();  // otherwise rehydration fails
    return this;
  }
  
  setSubClass() { 
    // TODO: decide which subclass I belong to, based on current properties
    const newSubClass= this.x < 0.4 ? RectangleNode : CircleNode; 
    Object.setPrototypeOf(this,newSubClass.prototype);      // de-optimises. not recommended when performance matters
    return this;
  }

  setImage(obj) { 
    if (!this.images) this.images = {};
    this.images[obj.uniqueId()] = obj;
    return this;
 }
 }

// a list of EntityType and/or RelationType ids that share the same CSS class
// also drives non-CSS default attributes such as image URL, initial transform, nestable, default cloaking etc.

class LayerDatum {
  constructor(class_name,graph) {
    const obj = {
      class_name: class_name,
      types: new Set([class_name]),
      nesting: { 
          enabled: false, // true <=> a non-empty node opens to an Euler region/contour
          closed: true, // true => a non-empty node initially display as collasped (rect)
          reversed: false // true <=> the 'from' node is logically the superset in each pair (normally the subset/element)
      },
      colour: { 
          fill: 'white',
          stroke: 'black'
      },
      image: graph.getDefaultImage(),
      frame: { bannerHeight: 30, stubWidth: 30, margin: 5 }
    }
    Object.assign(this,obj);
    WeakBind.parentOf.set(this,graph);
    return this;
  }


  uniqueId() { return this.class_name }

  addAliases(aliases) { 
    aliases.forEach(str => this.types.add(str));  
    return this;
    
  }
  appliesTo(str) { return this.types.has(str) }

}

class Entity {
  constructor(obj,ont,key=null) { 

    WeakBind.parentOf.set(this,ont);

    if (typeof obj === "string") { // convert it to a generic precursor object
      obj = {
          key: obj,
          name: obj,
          description: 'Not found in source JSON file',
          type: 'Entity'
          }
        }

    Object.assign(this, obj); 

    // align property names

    this.xid = this.id ?? key ?? obj.name ?? RandomId('E');
    this.uid = hashString(this.xid + ont.uid);
    this.txtName = this.name ?? this.label ?? this.xid;
    this.txtNote = this.labels ?? this.description ?? this.role ?? (this.properties ? Object.entries(this.properties) : '');
    
  }
  typeId() { return this.type ?? this.class ?? 'Entity'; }
  keyId() { return this.xid } // for local binding within this ontology
  uniqueId() { return this.uid } // used by d3, and to safely bind across ontologies without name collisions
  bind(ont) { this._type = ont.getEntityType(this.typeId()); return this; }
  toString() { return `${this.txtName}: ${this.txtNote}` } // NodeDatum.toString() will add descriptor via _datumType
  getParent() { return WeakBind.parentOf.get(this) }
}

class Relation  {

  constructor(obj,ont) {
    Object.assign(this, obj);
    WeakBind.parentOf.set(this,ont);

    this.keys = {
      xid: obj.key ?? RandomId('R'),
      // standardise keys for local binding within ontology
      xidEntityFrom: this.subject ?? this.from ?? this.sourceEntity,
      xidEntityTo: this.object ?? this.to ?? this.targetEntity,
      xidRelnType: this.predicate ?? this.type ?? this.cardinality ?? 'Relation'
      };

    this.keys.uid = hashString(this.keys.xid + ont.uid);
    }

  keyId() { return this.keys.xid }
  uniqueId() { return this.keys.uid } 
  toString() { return `${this._baseFrom.toString()} | ${this._baseType.toString()} | ${this._baseTo.toString()}` }

  // adapt to various names used in the source JSON data

  typeId() { return this.keys.xidRelnType }
  fromId() { return this.keys.xidEntityFrom }
  toId() { return this.keys.xidEntityTo }
  bind(ont) { 
    this._baseFrom = ont.getEntity(this.fromId());
    this._baseTo = ont.getEntity(this.toId());
    this._baseType = ont.getRelationType(this.typeId());
  }

  getParent() { return WeakBind.parentOf.get(this) }

}

// each Relation may be referenced in many Workbooks each with its own LinkDatum (x,y,fx,fy,width etc.)

class LinkDatum {  
 constructor(obj,graph) {
    this.base = obj; // Relation

    this.bind(graph);
    
    this.y = Math.random(); 
    WeakBind.parentOf.set(this,graph);

 }
  toString() { return `${this._datumFrom.toString()} | ${this._linkType.toString()} | ${this._datumTo.toString()}` } 
  setLinkType(linkType) { this._linkType = linkType; return this; }
  uniqueId() { return this.keys.uidThis } 
  // this only works when merging Ontology. not when rehydrating a saved Graph json
  bind(graph) {  // TODO: use _datumFrom instead of base? 
    // capture robust keys to enable re-binding eg after ontology is refreshed
    this.keys = this.keys ?? {
      uidDatumFrom: this.base._baseFrom.uniqueId(),
      uidDatumTo:   this.base._baseTo.uniqueId(),
      uidLinkType:  this.base._baseType.uniqueId(),
      uidBase:      this.base.uniqueId(),
      xidRelnType:  this.base._baseType.keyId()
    };
    this.keys.uidThis = hashString(this.keys.uidDatumFrom + this.keys.uidDatumTo + this.keys.uidLinkType);
    // rehydrate
    this._datumFrom = graph.nodes[this.keys.uidDatumFrom];
    this._datumTo = graph.nodes[this.keys.uidDatumTo];
    this._linkType = graph.linkTypes[this.keys.uidLinkType];

  }

  bindLayer(graph) { this._datumLayer = graph.getLayer(this.keys.xidRelnType) }

  getParent() { return WeakBind.parentOf.get(this) }
}
